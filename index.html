<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Memory Card Game</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Animated Background -->
    <div class="background">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="container">

        <!-- ================= HEADER ================= -->

        <header>

            <h1>
                <i class="fa-solid fa-brain"></i>
                Memory Card Game
            </h1>

            <p>
                Find all matching pairs!
            </p>

        </header>

        <!-- ================= STATS ================= -->

        <section class="stats">

            <div class="stat-card">

                <div class="icon purple">

                    <i class="fa-solid fa-right-left"></i>

                </div>

                <div class="details">

                    <span>Moves</span>

                    <h2 id="moves">0</h2>

                </div>

            </div>

            <div class="stat-card">

                <div class="icon green">

                    <i class="fa-regular fa-clock"></i>

                </div>

                <div class="details">

                    <span>Time</span>

                    <h2 id="timer">00:00</h2>

                </div>

            </div>

            <div class="stat-card">

                <div class="icon blue">

                    <i class="fa-solid fa-star"></i>

                </div>

                <div class="details">

                    <span>Pairs Found</span>

                    <h2><span id="pairs">0</span>/8</h2>

                </div>

            </div>

            <button id="restart">

                <i class="fa-solid fa-rotate-right"></i>

                Restart Game

            </button>

        </section>

        <!-- ================= GAME BOARD ================= -->

        <section class="board-wrapper">

            <div id="gameBoard" class="game-board">

                <!-- JavaScript creates the cards -->

            </div>

        </section>

        <!-- ================= TIP ================= -->

        <section class="tip">

            <i class="fa-regular fa-lightbulb"></i>

            <span>

                Tip: Remember the positions of the cards and find all matching
                pairs using the least number of moves!

            </span>

        </section>

        <!-- ================= FOOTER ================= -->

        <footer>

            Built with ❤️ using HTML, CSS & JavaScript

        </footer>

    </div>

    <!-- ================= WIN MODAL ================= -->

    <div id="winModal" class="modal">

        <div class="modal-content">

            <div class="winner-icon">

                🏆

            </div>

            <h2>

                Congratulations!

            </h2>

            <p>

                You matched all the cards.

            </p>

            <div class="results">

                <div>

                    <strong>Moves</strong>

                    <span id="finalMoves">0</span>

                </div>

                <div>

                    <strong>Time</strong>

                    <span id="finalTime">00:00</span>

                </div>

            </div>

            <button id="playAgain">

                Play Again

            </button>

        </div>

    </div>

    <!-- ================= CONFETTI ================= -->

    <div id="confetti-container"></div>

    <!-- ================= OPTIONAL AUDIO ================= -->

    <!--
    <audio id="flipSound" src="sounds/flip.mp3"></audio>
    <audio id="matchSound" src="sounds/match.mp3"></audio>
    <audio id="winSound" src="sounds/win.mp3"></audio>
    -->

    <!-- ================= SCRIPT ================= -->

    <script src="js/script.js"></script>

</body>

</html>
